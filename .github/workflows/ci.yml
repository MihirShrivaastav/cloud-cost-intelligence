
name: CI/CD Pipeline

# ── Triggers ──────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    branches:
      - main       # PRs to main get full review

# ── Environment variables ─────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  TERRAFORM_VERSION: "1.6.0"

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 ingestion/ analysis/ notifications/ dashboard/ \
            --max-line-length=100 \
            --exclude=__pycache__,.venv \
            --count \
            --statistics

  # ── Job 2: Test ───────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint]           # Only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --cov=analysis \
            --cov=ingestion \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()        # Upload even if tests fail — useful for debugging
        with:
          name: coverage-report
          path: .coverage
  # ── Job 3: Terraform Plan (on PRs only) ───────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Create tfvars for CI
        working-directory: infra
        run: |
          cat > terraform.tfvars << EOF
          slack_webhook_url = "${{ secrets.SLACK_WEBHOOK_URL }}"
          aws_region        = "${{ secrets.AWS_REGION }}"
          EOF

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var-file="terraform.tfvars" -no-color
        # -no-color: ANSI color codes look messy in GitHub logs

  # ── Job 4: Terraform Apply (on main pushes only) ──────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Create tfvars for CI
        working-directory: infra
        run: |
          cat > terraform.tfvars << EOF
          slack_webhook_url = "${{ secrets.SLACK_WEBHOOK_URL }}"
          aws_region        = "${{ secrets.AWS_REGION }}"
          EOF

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -var-file="terraform.tfvars" -auto-approve -no-color
