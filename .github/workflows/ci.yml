name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────
  # Checks code style and syntax using flake8.
  # Runs on every push — catches issues before they reach main.
  # No AWS credentials needed — purely local code analysis.
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 ingestion/ analysis/ notifications/ \
            --max-line-length=120 \
            --exclude=__pycache__,.venv,infra \
            --ignore=E501,W503 \
            --count \
            --statistics

  # ── Job 2: Test ───────────────────────────────────────────────
  # Runs full pytest suite with coverage report.
  # Only runs if lint passes — fail fast pattern.
  # No AWS credentials needed — uses mock data locally.
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --cov=analysis \
            --cov=ingestion \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ── Job 3: Terraform Plan (only on PRs to main) ───────────────
  # Shows what infrastructure WOULD change on a PR.
  # Only runs if AWS secrets are configured in GitHub.
  # Skips gracefully if secrets are missing — won't break CI.
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check AWS secrets exist
        id: check_secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "AWS secrets not configured — skipping Terraform plan"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        if: steps.check_secrets.outputs.skip == 'false'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configure AWS credentials
        if: steps.check_secrets.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Terraform Init and Plan
        if: steps.check_secrets.outputs.skip == 'false'
        working-directory: infra
        run: |
          terraform init
          cat > terraform.tfvars << EOF
          slack_webhook_url = "${{ secrets.SLACK_WEBHOOK_URL }}"
          aws_region        = "us-east-1"
          EOF
          terraform plan -var-file="terraform.tfvars" -no-color